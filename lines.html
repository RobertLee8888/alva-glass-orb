<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alva AI — line mark</title>
<style>
  :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  body{margin:0;background:#191a1d;color:#e9e9ec;display:flex;flex-direction:column;align-items:center;gap:20px;padding:28px 16px 44px}
  h1{font-size:15px;font-weight:500;color:#c9c9cf;margin:0}
  h1 a{color:#6f8f90;text-decoration:none;font-weight:400;font-size:12px;margin-left:10px}
  .seg{display:inline-flex;gap:3px;background:#232429;border:1px solid #303138;border-radius:10px;padding:4px}
  .seg button{border:none;background:transparent;color:#9a9aa2;font-size:13px;padding:7px 16px;border-radius:7px;cursor:pointer;font-family:inherit}
  .seg button.on{background:#3a3b42;color:#fff}
  table{border-collapse:collapse;margin:0 auto}
  th,td{border:1px solid #3a3b42}
  th{font-size:12px;color:#a6a6ac;font-weight:500;padding:9px 14px}
  th.rl{color:#8a8a92;text-align:right;line-height:1.6;padding:0 14px}
  td.cell{padding:0;line-height:0}
  .cv1{width:180px;height:100px;display:block}
  .cv2{width:180px;height:72px;display:block}
  @media (max-width:640px){
    body{padding:18px 8px 32px;gap:14px}
    h1{font-size:13px}
    .seg button{padding:6px 9px;font-size:12px}
    th{padding:6px 6px;font-size:11px}
    th.rl{padding:0 8px}
    .cv1{width:126px;height:92px}
    .cv2{width:100px;height:70px}
    .hint{font-size:11px;padding:0 6px}
  }
  .hint{font-size:12px;color:#75757d;max-width:560px;text-align:center;line-height:1.6}
</style>
</head>
<body>
  <h1>Alva AI · 线纹球 — 扁平<a href="./">玻璃球版 ↗</a><a href="./ascii.html">点阵版 ↗</a></h1>
  <div class="seg" id="seg"><button data-s="idle" class="on">待机</button><button data-s="thinking">思考</button><button data-s="speaking">输出中</button><button data-s="awaiting">等待回应</button></div>
  <table id="cols"></table>
  <div class="hint" id="hint"></div>
<script>
/* ============================================================
   Alva line mark — 一个圆 + 一种细线纹理
   参考 agent-thinking 案例的克制:单色、单形、连续整体;
   所有表达只用三个变量——光线(亮带)、节奏(速度)、形态(线的位移)。
   hover = 线条向鼠标轻轻弯过去;点击 = 从命中点荡开一圈径向涟漪。
   ============================================================ */
const S={
  mode:"idle",
  w:{idle:1,thinking:0,speaking:0,awaiting:0},
  swirl:0,swirlV:0.3,
  typeT:0,enterT:0,
  blinkAt:2.0,
  sweepAt:2.5,          // 待机:偶发的光带扫过(微事件)
  pulseAt:1e9,
  last:0
};
function stepState(t){
  const dt=Math.min(1.0,Math.max(0.001,t-S.last||0.016));S.last=t;   // 后台恢复一帧补齐
  for(const k in S.w){
    const tgt=(S.mode===k)?1:0;
    S.w[k]+=(tgt-S.w[k])*(1-Math.exp(-dt*((tgt>S.w[k])?3.2:1.8)));   // 起得快落得慢
  }
  const th=S.w.thinking;
  let vTgt=0.3;
  if(th>0.02){
    const ph=(t-S.enterT)%3.2;
    vTgt=0.3+th*(1.5+6.0*Math.pow(Math.sin(Math.PI*ph/3.2),2.0));    // 慢-快-慢甩动
  }
  S.swirlV+=(vTgt-S.swirlV)*(1-Math.exp(-dt*(vTgt>S.swirlV?1.6:0.9))); // 惯性滞后
  S.swirl+=S.swirlV*dt;
  if(S.w.speaking>0.4)S.typeT+=dt;                                   // 书写恒速
  if(t>S.blinkAt+0.5)S.blinkAt=t+3.5+Math.random()*6;
  if(t>S.sweepAt+1.4)S.sweepAt=t+3.5+Math.random()*4.5;              // 不可预测的光带
  if(S.mode==="awaiting"){
    if(S.pulseAt>1e8)S.pulseAt=t+0.4;
    if(t>S.pulseAt+2.0)S.pulseAt=t+8.0;
  }else S.pulseAt=1e9;
}
function setMode(m,t){if(S.mode!==m){S.mode=m;S.enterT=t;if(m==="speaking")S.typeT=0;if(m==="awaiting")S.pulseAt=1e9;}}
/* ---------- 场景:单色线,只分深浅 ---------- */
const SCENES=[
 {css:"#ffffff",cap:"白底 · 黑绿",line:(a)=>`rgba(23,53,55,${a})`,hi:(a)=>`rgba(61,151,154,${a})`},
 {css:"#0e0f13",cap:"深底 · 白绿",line:(a)=>`rgba(226,234,236,${a})`,hi:(a)=>`rgba(96,182,184,${a})`},
 {css:"#49a3a6",cap:"品牌绿 · 黑白",line:(a)=>`rgba(10,26,26,${a})`,hi:(a)=>`rgba(244,251,250,${a})`}
];
/* ---------- 单元格 ---------- */
function makeCell(cv,scene,markPx){
  const ctx=cv.getContext("2d");
  const hov={x:0,y:0,cur:0,tgt:0};       // 鼠标位置(球坐标,单位=R)
  const ripples=[];
  function toBall(e){const r=cv.getBoundingClientRect();
    return [((e.clientX-r.left)-r.width/2)/(markPx/2),((e.clientY-r.top)-r.height/2)/(markPx/2)];}
  cv.addEventListener("mousemove",e=>{const p=toBall(e);hov.x=p[0];hov.y=p[1];hov.tgt=1;});
  cv.addEventListener("mouseleave",()=>{hov.tgt=0;});
  cv.addEventListener("pointerdown",e=>{const p=toBall(e);
    ripples.push({x:Math.max(-1,Math.min(1,p[0])),y:Math.max(-1,Math.min(1,p[1])),t0:performance.now()/1000});
    if(ripples.length>4)ripples.shift();});
  function draw(t){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const W=cv.clientWidth||180,H=cv.clientHeight||100;
    if(cv.width!==Math.round(W*dpr)){cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);}
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle=scene.css;ctx.fillRect(0,0,W,H);
    hov.cur+=(hov.tgt-hov.cur)*0.14;
    const cx=W/2,cy=H/2,R=markPx/2;
    const wI=S.w.idle,wT=S.w.thinking,wS=S.w.speaking,wA=S.w.awaiting;
    /* 形态:呼吸极轻;眨眼=整球纵向一挤 */
    const breath=1+0.020*Math.sin(t*0.66)+0.010*Math.sin(t*1.13+0.9);
    let blinkY=1;const be=t-S.blinkAt;
    if(be>0&&be<0.35)blinkY=1-0.18*Math.sin(be/0.35*Math.PI)*wI;
    /* 光线:待机偶发一条横向亮带自上而下扫过 */
    const swp=t-S.sweepAt;
    const sweepPos=(swp>0&&swp<1.4)?(swp/1.4)*2.4-1.2:9;
    /* 书写:逐行,恒速,一气呵成;写完顿一拍按顺序褪去 */
    const M=15;                                     // 线数
    const cyc=2.6;
    const ws=(S.typeT%cyc)/cyc;                     // 0..1
    const writePos=ws*(M+2)/0.80;                   // 前 80% 写完全部行
    const fadePos=(ws-0.86)/0.14*(M+2);             // 最后一段按行序褪色
    const pt=t-S.pulseAt;
    ctx.lineWidth=Math.max(1,R*0.045);
    ctx.lineCap="round";
    const SEG=34;
    for(let li=0;li<M;li++){
      const y0=((li+0.5)/M)*2-1;                    // -1..1
      const hc=Math.sqrt(Math.max(0,1-y0*y0));      // 半弦长
      if(hc<0.12)continue;
      /* 输出中:该行的可见长度(左→右书写) */
      let f=1,tip=-9;
      if(wS>0.05){
        f=Math.max(0,Math.min(1,writePos-li));
        if(f>0&&f<1)tip=-hc+2*hc*f;
        if(fadePos>li)f=Math.max(0,f-(fadePos-li));  // 按书写顺序褪去
        if(f<=0)continue;
      }
      /* 亮度:基础 + 光带/旋转光 + 新旧墨 */
      let a=0.62;
      if(Math.abs(y0-sweepPos)<0.5)a+=0.38*Math.exp(-Math.pow((y0-sweepPos)*3.2,2))*wI;
      if(wA>0.05)a=0.30+0.20*wA*(li===1?1:0)+0.32*(1-wA*0.6);        // 等待:整体安静
      if(wS>0.05){const age=(writePos-li)/(M+2);a=0.25+0.75*Math.exp(-Math.max(0,age)*2.2);}
      ctx.strokeStyle=scene.line(Math.min(1,a));
      ctx.beginPath();
      const x1=-hc,x2=(wS>0.05&&f<1)?(-hc+2*hc*f):hc;
      for(let s2=0;s2<=SEG;s2++){
        const x=x1+(x2-x1)*s2/SEG;
        /* 形态位移场 */
        let dy=0.014*Math.sin(x*3.1+t*0.7+li*0.9)+0.008*Math.sin(x*5.3-t*0.45+li*1.7); // 待机微波(无理数比)
        dy*=(0.4+0.6*wI);
        if(wT>0.02){                                   // 思考:波幅+速度都被甩起来,带惯性
          const amp=0.045*wT*(0.5+0.5*Math.min(1,(S.swirlV-0.3)/5));
          dy+=amp*Math.sin(x*4.2+li*0.8-S.swirl*2.6)+0.02*wT*Math.sin(x*2.1-S.swirl*1.3+li*0.5);
        }
        if(pt>0&&pt<1.6){                              // 等待脉冲:一圈径向涟漪荡开
          const dd=Math.hypot(x,y0)+1e-4;
          const g=Math.exp(-Math.pow((dd-pt*1.1)*5.5,2))*(1-pt/1.6);
          dy+=0.05*g*(y0/dd);
        }
        if(hov.cur>0.01){                              // hover:紧邻鼠标的线段轻轻弯向鼠标
          const d2=(x-hov.x)*(x-hov.x)+(y0-hov.y)*(y0-hov.y);
          dy+=0.055*hov.cur*Math.exp(-d2/0.10)*(hov.y-y0);
        }
        for(let k2=0;k2<ripples.length;k2++){          // 点击涟漪:从命中点径向荡开
          const rp=ripples[k2];const rt=t-rp.t0;
          if(rt<0||rt>1.0)continue;
          const dd=Math.hypot(x-rp.x,y0-rp.y)+1e-4;
          const g=Math.exp(-Math.pow((dd-rt*2.6)*4.5,2))*Math.exp(-rt*2.5);
          dy+=0.06*g*((y0-rp.y)/dd);
        }
        /* 圆形轮廓约束:位移后仍留在圆内 */
        const yy=y0+dy;
        const px=cx+x*R*breath;
        const py=cy+yy*R*breath*blinkY;
        if(s2===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.stroke();
      /* 书写光标:当前行笔尖处一小段亮线 */
      if(tip>-8&&ws<0.86){
        ctx.strokeStyle=scene.hi(1);
        ctx.beginPath();
        ctx.moveTo(cx+(tip-0.06)*R*breath,cy+y0*R*breath*blinkY);
        ctx.lineTo(cx+tip*R*breath,cy+y0*R*breath*blinkY);
        ctx.stroke();
        ctx.strokeStyle=scene.line(1);
      }
    }
    /* 思考:一条亮带沿线纹旋扫(光线变量),速度=旋涡速度 */
    if(wT>0.05){
      ctx.save();
      ctx.beginPath();ctx.arc(cx,cy,R*breath*0.98,0,7);ctx.clip();
      const bandA=Math.atan2(Math.sin(S.swirl*1.0),Math.cos(S.swirl*1.0));
      const bx=Math.cos(bandA),by=Math.sin(bandA);
      const grd=ctx.createLinearGradient(cx-bx*R,cy-by*R,cx+bx*R,cy+by*R);
      grd.addColorStop(0.35,"rgba(0,0,0,0)");
      grd.addColorStop(0.5,scene.hi(0.55*wT));
      grd.addColorStop(0.65,"rgba(0,0,0,0)");
      ctx.fillStyle=grd;ctx.fillRect(cx-R,cy-R,R*2,R*2);
      ctx.restore();
    }
    /* 等待回应:右上一小段终端光标线,530ms 节律 */
    if(wA>0.05){
      const on=(Math.floor(t/0.53)%2)===0?1:0.15;
      ctx.strokeStyle=scene.hi(wA*on);
      ctx.lineWidth=Math.max(1.2,R*0.06);
      ctx.beginPath();
      ctx.moveTo(cx+R*0.78,cy-R*1.06);
      ctx.lineTo(cx+R*1.06,cy-R*1.06);
      ctx.stroke();
      ctx.lineWidth=Math.max(1,R*0.045);
    }
  }
  return {draw};
}
/* ---------- 页面 ---------- */
const cols=document.getElementById("cols");const insts=[];
const MOBILE=window.matchMedia&&window.matchMedia("(max-width:640px)").matches;
if(!MOBILE){
  cols.innerHTML='<tr><th></th>'+SCENES.map(sc=>'<th>'+sc.cap+'</th>').join('')+'</tr>'
   +'<tr><th class="rl">PC 常驻按钮<br>48px</th>'+SCENES.map((sc,i)=>'<td class="cell" style="background:'+sc.css+'"><canvas class="cv1" data-k="b'+i+'"></canvas></td>').join('')+'</tr>'
   +'<tr><th class="rl">Chat 行内 logo<br>32px</th>'+SCENES.map((sc,i)=>'<td class="cell" style="background:'+sc.css+'"><canvas class="cv2" data-k="s'+i+'"></canvas></td>').join('')+'</tr>';
}else{
  cols.innerHTML='<tr><th></th><th>PC 常驻<br>48px</th><th>Chat 行内<br>32px</th></tr>'
   +SCENES.map((sc,i)=>'<tr><th class="rl">'+sc.cap+'</th><td class="cell" style="background:'+sc.css+'"><canvas class="cv1" data-k="b'+i+'"></canvas></td><td class="cell" style="background:'+sc.css+'"><canvas class="cv2" data-k="s'+i+'"></canvas></td></tr>').join('');
}
SCENES.forEach((sc,i)=>{
  insts.push(makeCell(document.querySelector('canvas[data-k="b'+i+'"]'),sc,48));
  insts.push(makeCell(document.querySelector('canvas[data-k="s'+i+'"]'),sc,32));
});
const HINTS={
 idle:"待机 — 一个由细横线织成的圆,线纹以无理数比的节奏极轻地起伏;每 3.5~8 秒一条亮带自上而下扫过(不可预测的光线微事件);每 4~9 秒整球眨一次眼(纵向一挤)。hover:紧邻鼠标的线段轻轻弯向指针;点击:从命中点荡开一圈径向涟漪。",
 thinking:"思考 — 同一批线,波幅和速度被甩起来:慢-快-慢的节奏,转速带惯性滞后;一条亮带沿线纹旋扫,像光在球面上打转。没有新增元素,只有节奏和光线变了。",
 speaking:"输出中 — 线纹逐行书写:每行从左到右恒速铺开(一气呵成),笔尖是一小段亮色,新行亮旧行淡;写满顿一拍,按书写顺序逐行褪去,换气重来——像在写一页文字。",
 awaiting:"等待回应 — 全部线条安静下来,只剩右上角一小段亮线以 530ms 终端节律闪烁(该你了);每 10 秒一圈径向涟漪从中心荡出提醒;首次进入即刻脉冲一次。"
};
const hint=document.getElementById("hint");
function setHint(){hint.textContent=HINTS[S.mode];}
document.getElementById("seg").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on",x===b));
  setMode(b.dataset.s,performance.now()/1000);setHint();
});
setHint();
(function loop(){
  const t=performance.now()/1000;
  stepState(t);
  insts.forEach(o=>o.draw(t));
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
