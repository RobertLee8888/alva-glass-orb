/* ============================================================
   Alva line mark — 正负形反转版
   · 正形:实心圆盘,纯色为主 + 缓慢漂移的迷幻色渐变
   · 负形:细线(0.5px)与 Alva logo 都从圆盘上镂掉,露出背景色
   · 球体轮廓恒定;思考=波浪线加大振幅;输出=输入框(内容左推+光标闪);
     等待=蓝色米字缓慢转圈;hover=线段让开;点击=径向涟漪
   ============================================================ */
const S={
  mode:"idle",
  w:{idle:1,thinking:0,speaking:0,awaiting:0},
  swirl:0,swirlV:0.3,
  typeT:0,enterT:0,
  sweepAt:2.5,
  waveAt:3.0,
  miA:0,
  last:0
};
function stepState(t){
  const dt=Math.min(1.0,Math.max(0.001,t-S.last||0.016));S.last=t;
  for(const k in S.w){
    const tgt=(S.mode===k)?1:0;
    S.w[k]+=(tgt-S.w[k])*(1-Math.exp(-dt*((tgt>S.w[k])?3.2:1.8)));
  }
  const th=S.w.thinking;
  let vTgt=0.3;
  if(th>0.02){
    const ph=(t-S.enterT)%3.2;
    vTgt=0.3+th*(1.5+6.0*Math.pow(Math.sin(Math.PI*ph/3.2),2.0));   // 慢-快-慢
  }
  S.swirlV+=(vTgt-S.swirlV)*(1-Math.exp(-dt*(vTgt>S.swirlV?1.6:0.9)));
  S.swirl+=S.swirlV*dt;
  if(S.w.speaking>0.4)S.typeT+=dt;
  if(t>S.sweepAt+1.4)S.sweepAt=t+3.5+Math.random()*4.5;
  if(t>S.waveAt+1.6)S.waveAt=t+4+Math.random()*4.5;                 // 待机:偶尔涌一阵波动
  S.miA+=dt*(0.55+0.22*Math.sin(t*0.7));                            // 米字缓慢转,速度有呼吸
}
function setMode(m,t){if(S.mode!==m){S.mode=m;S.enterT=t;if(m==="speaking")S.typeT=0;}}
const logoImg=new Image();logoImg.src=TEX_LIGHT;   // 只用 alpha 做镂空
/* ---------- 场景:圆盘纯色为主,迷幻色做低调点缀 ---------- */
/* Siri 式迷幻:粉/蓝/紫/青四团色绕盘环流;
   不同底盘明度下用不同实际色值,保证视觉感知一致——
   中明度青盘(白底/深底)用高饱和+中透明,深墨盘(绿底)本身衬色更跳,改用略深色+略低透明 */
/* 流动色场调色带(自上而下):品牌青为锚,中段穿过 青→蓝→紫→粉→橙 的亮色带;
   分界线被多组正弦波推着横向流动(参考 alexharri 的 flowing gradient 拆解)。
   不同背景用不同实际色值保持感知一致:绿底的深盘用更深的锚色。 */
const SCENES=[
 {css:"#ffffff",cap:"白底 · 黑绿",base:[73,163,166],
  pal:[[0.00,[52,138,141]],[0.16,[96,214,232]],[0.32,[92,152,255]],[0.48,[152,112,250]],[0.64,[255,112,190]],[0.80,[255,186,122]],[1.00,[73,163,166]]]},
 {css:"#0e0f13",cap:"深底 · 白绿",base:[62,148,151],
  pal:[[0.00,[46,126,130]],[0.16,[100,220,238]],[0.32,[98,158,255]],[0.48,[158,118,252]],[0.64,[255,118,194]],[0.80,[255,192,128]],[1.00,[66,152,155]]]},
 {css:"#49a3a6",cap:"品牌绿 · 黑白",base:[18,66,70],
  pal:[[0.00,[14,52,56]],[0.16,[58,182,206]],[0.32,[60,122,236]],[0.48,[120,92,226]],[0.64,[232,92,168]],[0.80,[236,162,104]],[1.00,[18,66,70]]]}
];
function lutOf(scene){
  if(scene._lut)return scene._lut;
  const L=new Uint8Array(64*3),st=scene.pal;
  for(let i=0;i<64;i++){
    const w=i/63;
    let k=0;while(k<st.length-2&&st[k+1][0]<w)k++;
    const f=(w-st[k][0])/Math.max(1e-6,st[k+1][0]-st[k][0]);
    const c0=st[k][1],c1=st[k+1][1];
    L[i*3]=c0[0]+(c1[0]-c0[0])*f;L[i*3+1]=c0[1]+(c1[1]-c0[1])*f;L[i*3+2]=c0[2]+(c1[2]-c0[2])*f;
  }
  return scene._lut=L;
}
/* ---------- 单元格 ---------- */
function makeCell(cv,scene,markPx){
  const ctx=cv.getContext("2d");
  const oc=document.createElement("canvas");
  const octx=oc.getContext("2d");
  const FBS=40;                                    // 流动色场:低分辨率逐像素缓冲
  const fb=document.createElement("canvas");fb.width=FBS;fb.height=FBS;
  const fctx=fb.getContext("2d");
  const fimg=fctx.createImageData(FBS,FBS);
  const hov={x:0,y:0,cur:0,tgt:0};
  const lag={x:0,y:0};                             // logo 负形的延迟跟随
  const press={downT:-9,upT:-9,held:false};
  const ripples=[];
  function toBall(e){const r=cv.getBoundingClientRect();
    return [((e.clientX-r.left)-r.width/2)/(markPx/2),((e.clientY-r.top)-r.height/2)/(markPx/2)];}
  cv.addEventListener("mousemove",e=>{const p=toBall(e);hov.x=p[0];hov.y=p[1];hov.tgt=1;});
  cv.addEventListener("mouseleave",()=>{hov.tgt=0;});
  cv.addEventListener("pointerdown",e=>{const p=toBall(e);
    ripples.push({x:Math.max(-1,Math.min(1,p[0])),y:Math.max(-1,Math.min(1,p[1])),t0:performance.now()/1000});
    if(ripples.length>4)ripples.shift();
    press.downT=performance.now()/1000;press.held=true;});
  const rel=()=>{if(press.held){press.upT=performance.now()/1000;press.held=false;}};
  cv.addEventListener("pointerup",rel);cv.addEventListener("pointerleave",rel);cv.addEventListener("pointercancel",rel);
  function draw(t){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const W=cv.clientWidth||180,H=cv.clientHeight||100;
    if(cv.width!==Math.round(W*dpr)){cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);}
    if(oc.width!==cv.width){oc.width=cv.width;oc.height=cv.height;}
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle=scene.css;ctx.fillRect(0,0,W,H);
    hov.cur+=(hov.tgt-hov.cur)*0.14;
    const cx=W/2,cy=H/2,R=markPx/2;
    const wI=S.w.idle,wT=S.w.thinking,wS=S.w.speaking,wA=S.w.awaiting;
    /* 按压:整圆缩小,迷幻色被压到边缘一两个像素;抬起弹簧回弹 */
    let pv=0;
    if(press.held)pv=Math.min(1,(t-press.downT)/0.10);
    else{const ue=t-press.upT;if(ue>=0&&ue<0.8)pv=Math.exp(-ue*8)*Math.cos(ue*16);}
    const pvc=Math.max(0,Math.min(1,pv));
    const RS=R*(1-0.10*pvc);
    const ringIn=0.78+0.16*pvc;                   // 压紧到 ~0.94R(≈1-2px)
    const ringW=Math.max(0.035,0.09-0.055*pvc);
    /* logo 负形的延迟跟随:目标=鼠标方向,慢速滤波=拖一拍 */
    const lgx=hov.cur*Math.max(-1,Math.min(1,hov.x))*0.14;
    const lgy=hov.cur*Math.max(-1,Math.min(1,hov.y))*0.14;
    lag.x+=(lgx-lag.x)*0.05;lag.y+=(lgy-lag.y)*0.05;
    /* ---- 正形:流动的迷幻色圆盘 ----
       色带分界线由多组不同速度/频率的正弦波驱动,横向流过盘面(真·流动,不是色块平移);
       在 40×40 缓冲上逐像素查调色带 LUT,放大绘制,边缘天然柔和 */
    octx.setTransform(dpr,0,0,dpr,0,0);
    octx.clearRect(0,0,W,H);
    octx.globalCompositeOperation="source-over";
    const lut=lutOf(scene);
    const tf=t*(1+1.2*wT);                        // 思考时流得更快
    const d4=fimg.data;
    /* 中心=纯品牌色;迷幻色只在贴边一圈(rr>0.66),沿角向顺时针流动
       (整数倍 θ 的正弦保证环向无缝;所有相位同向推进=固定顺时针) */
    const base=scene.base;
    for(let j=0;j<FBS;j++){
      const ny=(j+0.5)/FBS*2-1;
      for(let i2=0;i2<FBS;i2++){
        const nx=(i2+0.5)/FBS*2-1;
        const rr2=nx*nx+ny*ny;
        const o=(j*FBS+i2)*4;
        if(rr2>1.10){d4[o+3]=0;continue;}
        const rr=Math.sqrt(rr2);
        let r8=base[0],g8=base[1],b8=base[2];
        const m=Math.max(0,Math.min(1,(rr-ringIn)/ringW));
        if(m>0){
          const th2=Math.atan2(ny,nx);
          let w=0.5
            +0.30*Math.sin(2*th2-tf*0.9)
            +0.18*Math.sin(3*th2-tf*1.35+1.7)
            +0.10*Math.sin(5*th2-tf*0.6+3.0)
            +0.35*(rr-ringIn-0.11);
          w=Math.max(0,Math.min(1,w));
          const li2=(w*63)|0;
          const mixf=m*m*0.80;                    // 越往中间越虚越淡,整体降一档艳度
          r8+=(lut[li2*3]-r8)*mixf;g8+=(lut[li2*3+1]-g8)*mixf;b8+=(lut[li2*3+2]-b8)*mixf;
        }
        d4[o]=r8;d4[o+1]=g8;d4[o+2]=b8;
        const edge=(1-rr)*FBS*0.5+0.5;
        d4[o+3]=Math.max(0,Math.min(1,edge))*255;
      }
    }
    fctx.putImageData(fimg,0,0);
    octx.imageSmoothingEnabled=true;
    octx.drawImage(fb,cx-RS,cy-RS,2*RS,2*RS);
    /* ---- 负形:线 + logo,从圆盘上镂掉 ---- */
    octx.globalCompositeOperation="destination-out";
    octx.lineWidth=0.5;                          // 默认线宽恒为 0.5
    octx.lineCap="round";
    const M=15;
    const fl=S.typeT*1.6;                        // 输出:内容流,恒速左移
    const swp=t-S.sweepAt;
    const sweepPos=(swp>0&&swp<1.4)?(swp/1.4)*2.4-1.2:9;
    const SEG=44;
    for(let li=0;li<M;li++){
      const y0=((li+0.5)/M)*2-1;
      const hc=Math.sqrt(Math.max(0,1-y0*y0));
      if(hc<0.10)continue;
      /* 镂空深度:基础 + 待机光带 + 等待收静 */
      let a=0.80;
      if(Math.abs(y0-sweepPos)<0.5)a=Math.min(1,a+0.20*Math.exp(-Math.pow((y0-sweepPos)*3.2,2))*wI);
      if(wA>0.05)a-=0.22*wA;
      octx.strokeStyle=`rgba(0,0,0,${Math.max(0,Math.min(1,a))})`;
      octx.beginPath();
      for(let s2=0;s2<=SEG;s2++){
        const x=-hc+2*hc*s2/SEG;
        let dy=0.026*Math.sin(x*3.1+t*1.15+li*0.9)+0.014*Math.sin(x*5.3-t*0.8+li*1.7);
        const wvp=t-S.waveAt;
        const wenv=(wvp>0&&wvp<1.6)?Math.sin(Math.PI*wvp/1.6):0;   // 偶发波动包络
        dy*=(0.4+0.6*wI)*((1-wI)+wI*(0.45+1.8*wenv));
        if(wT>0.02){                             // 思考:波浪线,振幅加大,慢-快-慢带惯性
          const amp=0.095*wT*(0.45+0.55*Math.min(1,(S.swirlV-0.3)/5));
          dy+=amp*Math.sin(x*4.2+li*0.8-S.swirl*2.9)+0.045*wT*Math.sin(x*2.1-S.swirl*1.5+li*0.5);
        }
        if(wS>0.05){                             // 输出:图形从右侧生成,向左推
          dy+=wS*(0.050*Math.sin(x*3.6+fl*2.2+li*1.3)+0.028*Math.sin(x*6.1+fl*3.1+li*0.7));
        }
        if(hov.cur>0.01){                        // hover:鼠标附近的线段让开
          const d2=(x-hov.x)*(x-hov.x)+(y0-hov.y)*(y0-hov.y);
          dy+=0.07*hov.cur*Math.exp(-d2/0.08)*(y0-hov.y>0?1:-1)*Math.exp(-Math.abs(y0-hov.y)*2);
        }
        for(let k2=0;k2<ripples.length;k2++){    // 点击:径向涟漪
          const rp=ripples[k2];const rt=t-rp.t0;
          if(rt<0||rt>1.0)continue;
          const dd=Math.hypot(x-rp.x,y0-rp.y)+1e-4;
          const g=Math.exp(-Math.pow((dd-rt*2.6)*4.5,2))*Math.exp(-rt*2.5);
          dy+=0.06*g*((y0-rp.y)/dd);
        }
        const px=cx+x*RS,py=cy+(y0+dy)*RS;
        if(s2===0)octx.moveTo(px,py);else octx.lineTo(px,py);
      }
      octx.stroke();
    }
    /* logo 负形:待机/等待镂出 mark;思考/输出消隐 */
    const lw2=Math.min(1,wI+wA);
    if(lw2>0.01&&logoImg.complete&&logoImg.naturalWidth>0){
      octx.globalAlpha=lw2;
      const sz=1.02*RS;
      octx.drawImage(logoImg,cx+lag.x*RS-sz/2,cy+lag.y*RS-sz/2,sz,sz);
      octx.globalAlpha=1;
    }
    /* 输出:右侧竖线光标(负形),530ms 输入节律 */
    if(wS>0.05){
      const on=(Math.floor(t/0.53)%2)===0?1:0.1;
      octx.strokeStyle=`rgba(0,0,0,${wS*on})`;
      octx.lineWidth=1;
      octx.beginPath();
      octx.moveTo(cx+RS*0.62,cy-RS*0.24);
      octx.lineTo(cx+RS*0.62,cy+RS*0.24);
      octx.stroke();
      octx.lineWidth=0.5;
    }
    octx.globalCompositeOperation="source-over";
    ctx.drawImage(oc,0,0,W,H);
    /* 等待回应:右上角蓝色米字,缓慢连续转圈 */
    if(wA>0.05){
      const mr=R*0.22,mx=cx+R*0.96,my=cy-R*0.96;
      ctx.strokeStyle=`rgba(71,153,255,${0.95*wA})`;
      ctx.lineWidth=Math.max(1,R*0.05);
      ctx.lineCap="round";
      for(let k=0;k<4;k++){
        const aa=S.miA+k*Math.PI/4;
        ctx.beginPath();
        ctx.moveTo(mx-Math.cos(aa)*mr,my-Math.sin(aa)*mr);
        ctx.lineTo(mx+Math.cos(aa)*mr,my+Math.sin(aa)*mr);
        ctx.stroke();
      }
    }
  }
  return {draw};
}
/* ---------- 页面 ---------- */

   +'<tr><th class="rl">Chat 行内 logo<br>32px</th>'+SCENES.map((sc,i)=>'<td class="cell" style="background:'+sc.css+'"><canvas class="cv2" data-k="s'+i+'"></canvas></td>').join('')+'</tr>';
}else{
  cols.innerHTML='<tr><th></th><th>PC 常驻<br>48px</th><th>Chat 行内<br>32px</th></tr>'
   +SCENES.map((sc,i)=>'<tr><th class="rl">'+sc.cap+'</th><td class="cell" style="background:'+sc.css+'"><canvas class="cv1" data-k="b'+i+'"></canvas></td><td class="cell" style="background:'+sc.css+'"><canvas class="cv2" data-k="s'+i+'"></canvas></td></tr>').join('');
}

});
const HINTS={
 idle:"待机 — 实心圆盘是正形(纯色为主,几团迷幻色缓慢漂移),细线与 Alva logo 都是负形镂空,露出背景色;球体轮廓恒定,生命感全在线纹起伏与偶发的亮带扫过。hover:鼠标附近的线段让开;点击:从命中点荡开径向涟漪。",
 thinking:"思考 — logo 负形消隐,镂空的线直接变成波浪线:振幅明显加大,慢-快-慢的节奏带惯性滞后;没有任何附加元素。",
 speaking:"输出中 — 像输入框:镂空线纹的图形不断从右侧生成、把之前的图形匀速向左推;右侧一根镂空竖线按输入光标节律(530ms)闪烁,模拟一直在输入。",
 awaiting:"等待回应 — 中心仍是 logo 负形,线条收静;右上角一枚蓝色米字不停地缓慢转圈(转速带轻微呼吸,不是匀速齿轮,也不是高速甩圈)。"
};

document.getElementById("seg").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on",x===b));

  stepState(t);
