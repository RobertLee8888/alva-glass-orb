/* ============================================================
   Alva line mark — 一个圆 + 一种细线纹理 + 中心负形
   线条在中心形状处断开:logo 以正负形的方式被"隔"出来;
   负形随状态变形——待机=Alva logo,思考=旋转十字,输出=文字光标,等待=圆点;
   状态权重平滑过渡,形状之间自然交叉渐变。
   参考 agent-thinking 案例的克制:单色、单形、连续整体;
   所有表达只用三个变量——光线(亮带)、节奏(速度)、形态(线的位移)。
   hover = 线条向鼠标轻轻弯过去;点击 = 从命中点荡开一圈径向涟漪。
   ============================================================ */
const S={
  mode:"idle",
  w:{idle:1,thinking:0,speaking:0,awaiting:0},
  swirl:0,swirlV:0.3,
  typeT:0,enterT:0,
  blinkAt:2.0,
  sweepAt:2.5,          // 待机:偶发的光带扫过(微事件)
  pulseAt:1e9,
  last:0
};
function stepState(t){
  const dt=Math.min(1.0,Math.max(0.001,t-S.last||0.016));S.last=t;   // 后台恢复一帧补齐
  for(const k in S.w){
    const tgt=(S.mode===k)?1:0;
    S.w[k]+=(tgt-S.w[k])*(1-Math.exp(-dt*((tgt>S.w[k])?3.2:1.8)));   // 起得快落得慢
  }
  const th=S.w.thinking;
  let vTgt=0.3;
  if(th>0.02){
    const ph=(t-S.enterT)%3.2;
    vTgt=0.3+th*(1.5+6.0*Math.pow(Math.sin(Math.PI*ph/3.2),2.0));    // 慢-快-慢甩动
  }
  S.swirlV+=(vTgt-S.swirlV)*(1-Math.exp(-dt*(vTgt>S.swirlV?1.6:0.9))); // 惯性滞后
  S.swirl+=S.swirlV*dt;
  if(S.w.speaking>0.4)S.typeT+=dt;                                   // 书写恒速
  if(t>S.blinkAt+0.5)S.blinkAt=t+3.5+Math.random()*6;
  if(t>S.sweepAt+1.4)S.sweepAt=t+3.5+Math.random()*4.5;              // 不可预测的光带
  S.miA=(S.miA||0)+dt*(0.55+0.22*Math.sin(t*0.7));                   // 米字:缓慢连续转,速度有呼吸
  if(S.mode==="awaiting"){
    if(S.pulseAt>1e8)S.pulseAt=t+0.4;
    if(t>S.pulseAt+2.0)S.pulseAt=t+8.0;
  }else S.pulseAt=1e9;
}
function setMode(m,t){if(S.mode!==m){S.mode=m;S.enterT=t;if(m==="speaking")S.typeT=0;if(m==="awaiting")S.pulseAt=1e9;}}
/* ---------- 中心负形:四个状态各一张 96×96 alpha 蒙版 ---------- */
function rr2(x,px,py,w,h,r){x.beginPath();x.moveTo(px+r,py);x.arcTo(px+w,py,px+w,py+h,r);x.arcTo(px+w,py+h,px,py+h,r);x.arcTo(px,py+h,px,py,r);x.arcTo(px,py,px+w,py,r);x.closePath();}
const MASKS=(function(){
  const mk=()=>{const c=document.createElement("canvas");c.width=96;c.height=96;return c;};
  const out={logo:null,pen:null};
  /* 笔(输出中):竖直笔身+笔尖,负形在球内书写 */
  let c=mk(),x=c.getContext("2d");x.fillStyle="#000";
  rr2(x,38,10,20,50,9);x.fill();
  x.beginPath();x.moveTo(38,58);x.lineTo(58,58);x.lineTo(48,84);x.closePath();x.fill();
  out.pen=x.getImageData(0,0,96,96).data;
  const img=new Image();
  img.onload=()=>{const c2=mk(),x2=c2.getContext("2d");x2.drawImage(img,8,8,80,80);out.logo=x2.getImageData(0,0,96,96).data;};
  img.src=TEX_LIGHT;                                                            // Alva logo(待机/等待),只取 alpha
  return out;
})();
function maskA(d,u,v){
  if(!d)return 0;
  const xx=(u*0.5+0.5)*96,yy=(v*0.5+0.5)*96;
  if(xx<0||yy<0||xx>=96||yy>=96)return 0;
  return d[(((yy|0)*96+(xx|0))<<2)+3]/255;
}

/* 每根线固定一个色相:主体品牌绿,穿插深绿/墨色,第 4、10 根是蓝紫彩线 */
function lineColor(scene,li,a){
  const idx=(li===4)?3:(li===10)?4:(li%5===2?1:(li%7===6?2:0));
  const c=scene.cols[idx];
  return `rgba(${c[0]},${c[1]},${c[2]},${a})`;
}
/* ---------- 单元格 ---------- */
function makeCell(cv,scene,markPx){
  const ctx=cv.getContext("2d");
  const hov={x:0,y:0,cur:0,tgt:0};       // 鼠标位置(球坐标,单位=R)
  const ripples=[];
  function toBall(e){const r=cv.getBoundingClientRect();
    return [((e.clientX-r.left)-r.width/2)/(markPx/2),((e.clientY-r.top)-r.height/2)/(markPx/2)];}
  cv.addEventListener("mousemove",e=>{const p=toBall(e);hov.x=p[0];hov.y=p[1];hov.tgt=1;});
  cv.addEventListener("mouseleave",()=>{hov.tgt=0;});
  cv.addEventListener("pointerdown",e=>{const p=toBall(e);
    ripples.push({x:Math.max(-1,Math.min(1,p[0])),y:Math.max(-1,Math.min(1,p[1])),t0:performance.now()/1000});
    if(ripples.length>4)ripples.shift();});
  function draw(t){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const W=cv.clientWidth||180,H=cv.clientHeight||100;
    if(cv.width!==Math.round(W*dpr)){cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);}
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle=scene.css;ctx.fillRect(0,0,W,H);
    hov.cur+=(hov.tgt-hov.cur)*0.14;
    const cx=W/2,cy=H/2,R=markPx/2;
    const wI=S.w.idle,wT=S.w.thinking,wS=S.w.speaking,wA=S.w.awaiting;
    /* 球体轮廓恒定:不呼吸不眨眼不压扁,生命感全部交给线 */
    const breath=1,blinkY=1;
    /* 光线:待机偶发一条横向亮带自上而下扫过 */
    const swp=t-S.sweepAt;
    const sweepPos=(swp>0&&swp<1.4)?(swp/1.4)*2.4-1.2:9;
    /* 输出中:输入框隐喻——线纹图形不断从右侧生成、把之前的图形向左推 */
    const M=21;                                     // 线数(更密)
    const fl=S.typeT*1.6;                           // 内容流相位,恒速左移
    ctx.lineWidth=0.5;                              // 默认线宽恒为 0.5
    ctx.lineCap="round";
    const SEG=44;
    const spn=0.62;                                  // 负形跨度(±0.62R)
    for(let li=0;li<M;li++){
      const y0=((li+0.5)/M)*2-1;                    // -1..1
      const hc=Math.sqrt(Math.max(0,1-y0*y0));      // 半弦长
      if(hc<0.12)continue;
      /* 亮度:基础 + 待机光带 + 等待安静(颜色不随 hover 变) */
      let a=0.66;
      if(Math.abs(y0-sweepPos)<0.5)a+=0.34*Math.exp(-Math.pow((y0-sweepPos)*3.2,2))*wI;
      if(wT>0.05)a=a*(1-wT)+0.78*wT;
      if(wS>0.05)a=a*(1-wS)+0.74*wS;
      if(wA>0.05)a-=0.18*wA;                         // 等待:整体收静
      ctx.strokeStyle=lineColor(scene,li,Math.min(1,a));
      ctx.beginPath();
      let pen=false;
      for(let s2=0;s2<=SEG;s2++){
        const x=-hc+2*hc*s2/SEG;
        /* 形态位移场(整体节奏比上一版快) */
        let dy=0.016*Math.sin(x*3.1+t*1.15+li*0.9)+0.009*Math.sin(x*5.3-t*0.8+li*1.7);
        dy*=(0.4+0.6*wI);
        if(wT>0.02){                                   // 思考:纯波浪线,振幅加大,慢-快-慢带惯性
          const amp=0.095*wT*(0.45+0.55*Math.min(1,(S.swirlV-0.3)/5));
          dy+=amp*Math.sin(x*4.2+li*0.8-S.swirl*2.9)+0.045*wT*Math.sin(x*2.1-S.swirl*1.5+li*0.5);
        }
        if(wS>0.05){                                   // 输出:图形从右侧不断生成,向左推移(相位恒速左移)
          dy+=wS*(0.050*Math.sin(x*3.6+fl*2.2+li*1.3)+0.028*Math.sin(x*6.1+fl*3.1+li*0.7));
        }
        if(hov.cur>0.01){                              // hover:鼠标附近的线段让开(避让,不变色)
          const d2=(x-hov.x)*(x-hov.x)+(y0-hov.y)*(y0-hov.y);
          dy+=0.07*hov.cur*Math.exp(-d2/0.08)*(y0-hov.y>0?1:-1)*Math.exp(-Math.abs(y0-hov.y)*2);
        }
        for(let k2=0;k2<ripples.length;k2++){          // 点击涟漪:从命中点径向荡开
          const rp=ripples[k2];const rt=t-rp.t0;
          if(rt<0||rt>1.0)continue;
          const dd=Math.hypot(x-rp.x,y0-rp.y)+1e-4;
          const g=Math.exp(-Math.pow((dd-rt*2.6)*4.5,2))*Math.exp(-rt*2.5);
          dy+=0.06*g*((y0-rp.y)/dd);
        }
        /* 中心负形:待机/等待=Alva logo(不变形);思考/输出=无(logo 消隐) */
        const am=(wI+wA)*maskA(MASKS.logo,x/spn,y0/spn);
        if(am/(wI+wT+wS+wA+1e-6)>0.45){pen=false;continue;}
        const yy=y0+dy;
        const px=cx+x*R*breath;
        const py=cy+yy*R*breath*blinkY;
        if(!pen){ctx.moveTo(px,py);pen=true;}else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    /* 输出中:右侧一根竖线按输入光标节律闪烁(输入框分隔符) */
    if(wS>0.05){
      const on=(Math.floor(t/0.53)%2)===0?1:0.1;
      ctx.strokeStyle=lineColor(scene,0,wS*on);
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(cx+R*0.62,cy-R*0.24);
      ctx.lineTo(cx+R*0.62,cy+R*0.24);
      ctx.stroke();
      ctx.lineWidth=0.5;
    }
    /* 等待回应:右上角一枚蓝色米字,不停地缓慢转圈(速度带轻微呼吸,不是匀速齿轮) */
    if(wA>0.05){
      const mr=R*0.22,mx=cx+R*0.96,my=cy-R*0.96;
      ctx.strokeStyle=`rgba(71,153,255,${0.95*wA})`;
      ctx.lineWidth=Math.max(1,R*0.05);
      for(let k=0;k<4;k++){
        const aa=S.miA+k*Math.PI/4;
        ctx.beginPath();
        ctx.moveTo(mx-Math.cos(aa)*mr,my-Math.sin(aa)*mr);
        ctx.lineTo(mx+Math.cos(aa)*mr,my+Math.sin(aa)*mr);
        ctx.stroke();
      }
      ctx.lineWidth=0.5;
    }
  }
  return {draw};
}

 thinking:"思考 — logo 消隐,整球直接变成波浪线:振幅明显加大,慢-快-慢的节奏带惯性滞后;没有任何附加元素。",
 speaking:"输出中 — 像输入框:线纹图形不断从右侧生成、把之前的图形匀速向左推;右侧一根竖线按输入光标节律(530ms)闪烁,模拟一直在输入的感觉。",
 awaiting:"等待回应 — 中心仍是 logo 负形,线条收静;右上角一枚蓝色米字不停地缓慢转圈(转速带轻微呼吸,不是匀速齿轮,也不是高速甩圈)。"
};
