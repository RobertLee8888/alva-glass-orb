    const s2js=(penT*0.16)%1;
    penV=(s2js<0.84)?3.4:(s2js<0.96?0.6:0.3);
    if(s2js<lastS2)penVar=Math.floor(Math.random()*4); /* 每次重写换一种手写体 */
    lastS2=s2js;
  } else if(state==="awaiting"){
    /* 等待回应:期待而专注——朝用户方向持续微倾,呼吸稍快稍浅,周期性柔和"示意" */
    en=0.9;fsp=0.8;
    const nud=Math.pow(0.5+0.5*Math.sin(t*0.55),3.0);
    br=1.0+0.005*Math.sin(t*1.45)+0.0035*Math.sin(t*2.3+0.8);
    d1=[0.35,0.9,0.05+0.045*nud]; /* 右上方向(朝向用户)的柔和鼓起,缓慢探身 */
    d2=[-t*0.18+2.0,0.9,0.030];
    flareTgt=evF+0.18*nud;
    swTgt=0.15+0.05*nud;
  } else {
    en=0.85+0.35*evF;fsp=0.85;
    /* 呼吸:两个无理数比频率叠加,近似匀但不匀;事件2=偶尔轻轻吸一口气 */
    br=1.0+0.004*Math.sin(t*0.9)+0.0032*Math.sin(t*1.7+1.3)+0.010*evB;
    /* 基线型变:幅度保持原调校,但游走角速度摆动 + 双频幅度调制,节奏不再均匀 */
    const w1=0.30*t+0.6*Math.sin(t*0.11);
    d1=[w1,0.8,0.075+0.020*Math.sin(t*0.63)+0.008*Math.sin(t*1.31+0.5)];
    d2=[-0.22*t+2.0,0.85,0.058+0.015*Math.sin(t*0.49+1.0)];
    flareTgt=evF;
    swTgt=0.13+0.02*Math.sin(t*0.23);
  }
  br+=0.8*evAmp*evQ; /* 切入思考:尺寸大小的阻尼抖动(非位移) */
  /* flare 缓入缓出 */
  flare+=(flareTgt-flare)*(flareTgt>flare?1-Math.exp(-dt*8):1-Math.exp(-dt*4.5));
  /* 环流:目标速度由各状态给出,经惯性滤波——加速滞后(被卷起来),退回慢速状态用慢惯性滑落 */
  swirlVS+=(swTgt-swirlVS)*(swTgt>swirlVS?1-Math.exp(-dt*1.5):1-Math.exp(-dt*((state==="thinking"||state==="speaking")?1.3:0.7)));
  swirl+=dt*swirlVS;
  /* 离心感:转得越快,光彩越贴外圈、越密 */
  const cent=Math.min(1,Math.max(0,(swirlVS-0.25)/1.8));
  /* 圆点轨道:切思考时从球心弹射出去(带过冲),回待机时收拢回球心——切换的动感 */
  let orbit;
  if(state==="thinking"){const s=Math.max(0,el-0.10);orbit=0.24*(1-Math.exp(-7*s)*Math.cos(11*s));}
  else{orbit=0.24*Math.exp(-9*Math.max(0,el));}
  const streakT=(state==="thinking")?0.75:(state==="speaking"?0.35:0.15); /* 转快时条纹拉长 */
  streak+=(streakT-streak)*(1-Math.exp(-dt*6));
  writeCF+=((state==="speaking"?1:0)-writeCF)*(1-Math.exp(-dt*8));
  awaitCF+=((state==="awaiting"?1:0)-awaitCF)*(1-Math.exp(-dt*6));
  penT+=dt*penV;
  /* 卫星轨道:停驻 8.8s 后用 1.2s 迪士尼式绕球一圈——先向后蓄力、疾速掠过、过冲回位;
     绕圈途中主球被"勒"得沿轨道拉长压扁 */
  let sat=0,sq=0;
  if(state==="awaiting"){
    const ph=(t-transStart)%10;
    if(ph>8.5&&ph<=9.7){
      /* 绕圈:蓄力-疾掠-过冲;前段绳子越绕越紧,后段松绳弹回——蓝点归位时球已复原 */
      const k=(ph-8.5)/1.2;
      const c2b=2.5949095;
      const fb=(k<0.5)?(4*k*k*((c2b+1)*2*k-c2b))/2:((2*k-2)*(2*k-2)*((c2b+1)*(2*k-2)+c2b)+2)/2;
      sat=fb*6.28318;
      /* 勒紧量跟随实际缠绕进度:蓄力后撤(fb<0)时不勒,起飞缠上去才渐紧 */
      if(k<0.55){sq=0.10*Math.min(1,Math.max(0,fb)*1.6);}
      else{const s=(k-0.55)*1.2;sq=0.10*Math.exp(-s*9)*Math.cos(s*26);}
    }
  }
  flowT+=dt*fsp;
  const o={t:t,ft:flowT,en:en,br:br,spin:spin,pop:pop,head:head,flare:flare,swirl:swirl,streak:streak,cent:cent,orbit:orbit,awa:awaitCF,wri:writeCF,penT:penT,sat:sat,sq:sq,pvar:penVar,off:off,d1:d1,d2:d2,d3:d3};
  insts.forEach(i=>i.render(o));requestAnimationFrame(loop);}
requestAnimationFrame(loop);
document.querySelectorAll("#seg button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll("#seg button").forEach(x=>x.classList.remove("on"));b.classList.add("on");
  state=b.dataset.s;transStart=performance.now()/1000;transFrom=spin;transTo=(state==="thinking")?1:0;
  if(state==="thinking"){whipStart=transStart+0.10;}
  evStart=-9;nextEv=transStart+1.6+Math.random()*2.0;
  /* 只在切入思考时抖(尺寸抖动);返回待机不抖 */
  if(state==="thinking"){evStart=transStart+0.06;evType=0;evAng=Math.random()*6.28318;evAmp=0.07;}
  if(state==="speaking"){penT=0;lastS2=0;penVar=Math.floor(Math.random()*4);} /* 进入输出:随机一种手写体,从「A」落笔 */
}));
</script>
