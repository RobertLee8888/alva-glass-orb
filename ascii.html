/* ============================================================
   Alva ASCII mark — 扁平字符晶格
   容器 = 字符场(承载 hover/press/脉冲), 内容 = 中心 crisp logo(承载呼吸/眨眼/注视)
   字符密度阶梯: 空 → 微点 → 点 → 十字 → 菱形 → 小方 → 圆角块
   ============================================================ */
function hash2(ix,iy){let h=(ix*374761393+iy*668265263)>>>0;h=(h^(h>>13))>>>0;h=(h*1274126177)>>>0;return ((h^(h>>16))>>>0)/4294967296;}
/* 全局状态机:所有格子共享一套神经系统 */
const S={
  mode:"idle",
  w:{idle:1,thinking:0,speaking:0,awaiting:0},   // 状态权重(指数滤波,切换永远是渐变)
  swirl:0,swirlV:0.25,                            // 思考旋涡:相位与被滤波的角速度
  typeT:0,                                        // 输出:打字相位(恒速,一气呵成)
  enterT:0,                                       // 进入当前状态的时刻
  gz:[0,0],gzT:[0,0],nextGaze:2.5,                // 注视
  blinkAt:2.0,                                    // 眨眼
  twinkleSeed:0,nextTw:1.5,                       // 待机微闪烁事件
  pulseAt:1e9,                                    // 等待:脉冲波起始时刻
  last:0
};
function stepState(t){
  const dt=Math.min(0.05,t-S.last||0.016);S.last=t;
  for(const k in S.w){
    const tgt=(S.mode===k)?1:0;
    const rate=(tgt>S.w[k])?3.0:1.8;              // 起得快落得慢:兴奋快,平静有惯性
    S.w[k]+=(tgt-S.w[k])*(1-Math.exp(-dt*rate));
  }
  /* 思考:角速度慢-快-慢地甩,旋涡相位滞后跟随(被卷起来的感觉) */
  const th=S.w.thinking;
  let vTgt=0.25;
  if(th>0.02){
    const ph=(t-S.enterT)%3.2;
    const whip=Math.pow(Math.sin(Math.PI*ph/3.2),2.0);
    vTgt=0.25+th*(1.2+5.5*whip);
  }
  S.swirlV+=(vTgt-S.swirlV)*(1-Math.exp(-dt*(vTgt>S.swirlV?1.6:0.9)));
  S.swirl+=S.swirlV*dt;
  /* 输出:打字相位恒速推进(中途不减速);权重低时暂停 */
  if(S.w.speaking>0.4)S.typeT+=dt;
  /* 注视:待机随机张望 */
  if(t>S.nextGaze){
    S.gzT=(Math.random()<0.3)?[0,0]:[(Math.random()-0.5)*0.10,(Math.random()-0.5)*0.07];
    S.nextGaze=t+2.5+Math.random()*4;
  }
  S.gz[0]+=(S.gzT[0]-S.gz[0])*(1-Math.exp(-dt*4));
  S.gz[1]+=(S.gzT[1]-S.gz[1])*(1-Math.exp(-dt*4));
  if(t>S.blinkAt+0.5)S.blinkAt=t+3.5+Math.random()*6;
  if(t>S.nextTw){S.twinkleSeed=Math.floor(Math.random()*1e6);S.nextTw=t+2+Math.random()*4;}
  /* 等待:每 10s 一次脉冲(进入时先来一次) */
  if(S.mode==="awaiting"){
    if(S.pulseAt>1e8)S.pulseAt=t+0.4;
    if(t>S.pulseAt+2.0)S.pulseAt=t+8.0;
  }else S.pulseAt=1e9;
}
function setMode(m,t){if(S.mode!==m){S.mode=m;S.enterT=t;if(m==="speaking")S.typeT=0;if(m==="awaiting")S.pulseAt=1e9;}}
/* ---------- 字符密度场:d(u,v) ∈ [0,1] ---------- */
/* u,v ∈ [-1,1] 覆盖字符瓦片;rr=超椭圆半径(瓦片是圆角方形的势场) */
function fieldIdle(u,v,rr,t,ix,iy){
  let d=0.26+0.14*Math.sin(u*2.3+t*0.31)*Math.sin(v*2.1-t*0.23)
       +0.10*Math.sin((u+v)*1.7+t*0.19);
  /* 微闪烁:少数格子在随机时刻升一阶再落下(不可预测的心跳) */
  const hw=hash2(ix+S.twinkleSeed,iy*7+1);
  if(hw>0.985){const ph=(t-S.nextTw+6)%6;d+=0.5*Math.exp(-Math.pow((ph-0.3)*4,2));}
  return d;
}
function fieldThink(u,v,rr,t,ang){
  /* 旋涡点阵:三臂螺旋,转速被 swirl 相位驱动;转快时密度向外圈甩(离心) */
  const sp=Math.sin(ang*3-S.swirl*2.0+rr*4.5);
  const fast=Math.min(1,(S.swirlV-0.25)/4.5);
  let d=0.30+0.38*sp*(0.55+0.45*rr)+0.22*fast*(rr-0.35);
  return d;
}
function fieldSpeak(u,v,rr,t,ix,iy,N){
  /* 打字机:按行左→右扫描,新字亮旧字淡;整页打完→顿一拍→按打字顺序消散→重来 */
  const total=N*N;
  const speed=total/1.6;                       // 1.6s 打满一页,恒速
  const cycle=total/speed+0.9;                 // 打字 + 消散/停顿
  const ph=S.typeT%cycle;
  const idx=iy*N+ix;
  let d=0;
  if(ph*speed>=idx){
    const age=ph-idx/speed;
    d=0.15+0.75*Math.exp(-age*1.1);            // 新墨深旧墨淡
    if(ph>total/speed){                        // 抬笔:按打字顺序消散
      const dis=(ph-total/speed)*speed*2.2;
      if(dis>idx)d*=Math.max(0,1-(dis-idx)/(total*0.18));
    }
  }
  /* 光标块:当前正在打的格子满亮 */
  if(Math.floor(ph*speed)===idx&&ph<total/speed)d=1;
  return d;
}
function fieldAwait(u,v,rr,t){
  let d=0.15+0.07*Math.sin(u*1.9+t*0.26)*Math.sin(v*1.7-t*0.21);
  /* 脉冲环:从中心荡出去的一圈提醒 */
  const pt=t-S.pulseAt;
  if(pt>0&&pt<1.6){const R=pt*0.9;d+=0.55*Math.exp(-Math.pow((rr-R)*7,2))*(1-pt/1.6);}
  return d;
}
/* ---------- 字符绘制:七阶阶梯 ---------- */
function drawGlyph(x2,y2,c,lvl,color,ctx){
  ctx.fillStyle=color;
  const h=c/2;
  if(lvl<=0)return;
  if(lvl===1){ctx.beginPath();ctx.arc(x2,y2,c*0.07,0,7);ctx.fill();return;}
  if(lvl===2){ctx.beginPath();ctx.arc(x2,y2,c*0.13,0,7);ctx.fill();return;}
  if(lvl===3){const w=c*0.13,l=c*0.62;                        /* 十字 */
    ctx.fillRect(x2-l/2,y2-w/2,l,w);ctx.fillRect(x2-w/2,y2-l/2,w,l);return;}
  if(lvl===4){const s=c*0.42;                                  /* 菱形 */
    ctx.beginPath();ctx.moveTo(x2,y2-s);ctx.lineTo(x2+s,y2);ctx.lineTo(x2,y2+s);ctx.lineTo(x2-s,y2);ctx.closePath();ctx.fill();return;}
  if(lvl===5){const s=c*0.56;rr2(ctx,x2-s/2,y2-s/2,s,s,c*0.14);ctx.fill();return;}   /* 小方 */
  const s=c*0.82;rr2(ctx,x2-s/2,y2-s/2,s,s,c*0.26);ctx.fill();                        /* 圆角块 */
}
function rr2(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

/* ---------- 单元格实例 ---------- */
function makeCell(cv,scene,tilePx){
  const ctx=cv.getContext("2d");
  const img=new Image();let imgOK=false;img.onload=()=>{imgOK=true;};img.src=scene.tex();
  const hov={x:0,y:0,cur:0,tgt:0};
  const press={downT:-9,upT:-9,held:false};
  cv.addEventListener("mousemove",e=>{const r=cv.getBoundingClientRect();
    hov.x=(e.clientX-r.left)/r.width*2-1;hov.y=(e.clientY-r.top)/r.height*2-1;hov.tgt=1;});
  cv.addEventListener("mouseleave",()=>{hov.tgt=0;});
  cv.addEventListener("pointerdown",()=>{press.downT=performance.now()/1000;press.held=true;});
  const rel=()=>{if(press.held){press.upT=performance.now()/1000;press.held=false;}};
  cv.addEventListener("pointerup",rel);cv.addEventListener("pointerleave",rel);cv.addEventListener("pointercancel",rel);
  function draw(t){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const W=cv.clientWidth||180,H=cv.clientHeight||100;
    if(cv.width!==Math.round(W*dpr)){cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);}
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle=scene.css;ctx.fillRect(0,0,W,H);
    const tile=Math.min(tilePx,H*0.86);
    const N=Math.max(11,Math.round(tile/3.8))|1;   // 奇数格,中心对称
    const c=tile/N;
    const cx=W/2,cy=H/2;
    hov.cur+=(hov.tgt-hov.cur)*0.14;
    /* 按压量:压下 90ms 贴平,抬起弹簧回弹(与玻璃球同一套触感语言) */
    let prs=0;
    if(press.held)prs=Math.min(1,(t-press.downT)/0.09);
    else{const ue=t-press.upT;if(ue>=0&&ue<0.9)prs=Math.exp(-ue*7)*Math.cos(ue*18);}
    const sc=(1+0.03*hov.cur)*(1-0.06*Math.max(0,prs));  // hover 微涨,按压微缩(纸面被按住)
    /* 字符场 */
    const wI=S.w.idle,wT=S.w.thinking,wS=S.w.speaking,wA=S.w.awaiting;
    const wSum=wI+wT+wS+wA+1e-6;
    for(let iy=0;iy<N;iy++)for(let ix=0;ix<N;ix++){
      let u=(ix-(N-1)/2)/((N-1)/2),v=(iy-(N-1)/2)/((N-1)/2);
      const rr=Math.pow(Math.pow(Math.abs(u),4)+Math.pow(Math.abs(v),4),0.25);
      if(rr>1.02)continue;
      const ang=Math.atan2(v,u);
      let d=(wI*fieldIdle(u,v,rr,t,ix,iy)
            +wT*fieldThink(u,v,rr,t,ang)
            +wS*fieldSpeak(u,v,rr,t,ix,iy,N)
            +wA*fieldAwait(u,v,rr,t))/wSum;
      /* 中心让位给 logo(思考时 logo 消隐,中心交还给旋涡) */
      const hole=1-Math.min(1,Math.max(0,(rr-0.30)/0.20));
      d*=1-(0.9-0.75*wT)*hole;
      /* 包络:边缘渐隐,瓦片没有硬边 */
      d*=1-Math.min(1,Math.max(0,(rr-0.80)/0.22));
      /* hover:靠近指针的字符升阶(容器感知到你) */
      if(hov.cur>0.01){
        const du=u-hov.x*(W/tile),dv=v-hov.y*(H/tile);
        d+=0.35*hov.cur*Math.exp(-(du*du+dv*dv)*6);
      }
      /* 按压:整场字符被"按平"——密度趋向中间值,对比消失 */
      const pc=Math.max(0,prs);
      d=d*(1-0.5*pc)+0.30*pc;
      if(d<=0.04)continue;
      const lvl=Math.min(6,Math.floor(d*6.2));
      const alpha=Math.min(1,0.35+d*0.75);
      const hi=d>0.72;
      const gx=cx+u*tile/2*sc,gy=cy+v*tile/2*sc;
      drawGlyph(gx,gy,c*sc,lvl,hi?scene.glyphHi(alpha):scene.glyph(alpha),ctx);
    }
    /* 等待回应:右上角终端光标块,530ms 节律闪烁(该你输入了) */
    if(wA>0.02){
      const on=(Math.floor(t/0.53)%2)===0?1:0.15;
      const s=c*1.35;
      const bx=cx+tile/2*0.82,by=cy-tile/2*0.82;
      ctx.globalAlpha=wA*on;rr2(ctx,bx-s/2,by-s/2,s,s,s*0.22);ctx.fillStyle=scene.cursor;ctx.fill();ctx.globalAlpha=1;
    }
    /* 内容层:crisp logo(呼吸/眨眼/注视);思考时消隐让位给旋涡 */
    const logoA=1-Math.min(1,wT*1.4);
    if(imgOK&&logoA>0.02){
      const breath=1+0.030*Math.sin(t*0.66)+0.016*Math.sin(t*1.13+0.9);
      let blinkY=1;const be=t-S.blinkAt;
      if(be>0&&be<0.4)blinkY=1-0.10*Math.sin(be/0.4*Math.PI);
      let gx2=S.gz[0],gy2=S.gz[1];
      if(hov.cur>0.01){gx2=gx2*(1-hov.cur)+hov.x*0.06*hov.cur;gy2=gy2*(1-hov.cur)+hov.y*0.045*hov.cur;}
      const ls=tile*0.42*breath*sc*(1+0.10*Math.max(0,prs));   // 按压:内容贴纸面被放大一点
      ctx.save();ctx.globalAlpha=logoA;
      ctx.translate(cx+gx2*tile,cy+gy2*tile);
      ctx.rotate(gx2*0.5);ctx.scale(1,blinkY);
      ctx.drawImage(img,-ls/2,-ls/2,ls,ls);
      ctx.restore();
    }
  }
  return {draw};
}

 idle:"待机 — 字符场安静地起伏(两组无理数比正弦叠加,永不重复),偶发的字符微闪烁像不定时的心跳;中心 logo 承载表情:呼吸、每 3~9 秒眨眼、随机张望。",
 thinking:"思考 — logo 消隐,中心交还给字符旋涡:三臂螺旋点阵慢-快-慢地甩动,转快时字符被离心力甩向外圈;转速带惯性滞后,退出时慢慢滑落回平静。",
 speaking:"输出中 — 打字机:字符按行左→右恒速敲出(一气呵成,1.6s 一页),光标块满亮,新字深旧字淡;打完顿一拍,再按打字顺序逐段消散,重新开始。",
 awaiting:"等待回应 — 右上角一枚终端光标块以 530ms 节律闪烁(该你了);字符场几乎静止,每 10 秒从中心荡出一圈脉冲提醒;首次进入即刻脉冲一次。"
