/* ============================================================
   Alva ASCII mark v7 — 品牌字符阶梯 + 自包含点阵按钮
   · 按钮 = 一小块点阵贴片:按钮的"背景"就是这张稳定基线点阵,
     圆角轮廓由角部格点裁切形成,放在页面任何角落都自成一体,格点永不移位
   · 颜色通道 = 内容与状态:一部分点变色,组成 logo / 旋涡 / 打字 / 脉冲等图形
   · 大小通道 = hover 反馈:离鼠标越近点越大(明确指向,不随机)
   · 点击 = 从命中的那个点向四周荡开一圈涟漪
   ============================================================ */
function hash2(ix,iy){let h=(ix*374761393+iy*668265263)>>>0;h=(h^(h>>13))>>>0;h=(h*1274126177)>>>0;return ((h^(h>>16))>>>0)/4294967296;}
const S={
  mode:"idle",
  w:{idle:1,thinking:0,speaking:0,awaiting:0},
  swirl:0,swirlV:0.25,
  typeT:0,
  enterT:0,
  gz:[0,0],gzT:[0,0],nextGaze:2.5,
  blinkAt:2.0,
  twinkleSeed:0,nextTw:1.5,
  pulseAt:1e9,
  last:0
};
function stepState(t){
  /* dt 上限 1s:指数滤波无条件稳定;后台标签页 RAF 暂停后一帧补齐 */
  const dt=Math.min(1.0,Math.max(0.001,t-S.last||0.016));S.last=t;
  for(const k in S.w){
    const tgt=(S.mode===k)?1:0;
    const rate=(tgt>S.w[k])?3.2:1.8;
    S.w[k]+=(tgt-S.w[k])*(1-Math.exp(-dt*rate));
  }
  const th=S.w.thinking;
  let vTgt=0.25;
  if(th>0.02){
    const ph=(t-S.enterT)%3.2;
    const whip=Math.pow(Math.sin(Math.PI*ph/3.2),2.0);
    vTgt=0.25+th*(1.2+5.5*whip);            // 慢-快-慢甩动
  }
  S.swirlV+=(vTgt-S.swirlV)*(1-Math.exp(-dt*(vTgt>S.swirlV?1.6:0.9))); // 惯性滞后
  S.swirl+=S.swirlV*dt;
  if(S.w.speaking>0.4)S.typeT+=dt;          // 打字恒速,一气呵成
  if(t>S.nextGaze){
    S.gzT=(Math.random()<0.3)?[0,0]:[(Math.random()-0.5)*0.30,(Math.random()-0.5)*0.22];
    S.nextGaze=t+2.5+Math.random()*4;
  }
  S.gz[0]+=(S.gzT[0]-S.gz[0])*(1-Math.exp(-dt*4));
  S.gz[1]+=(S.gzT[1]-S.gz[1])*(1-Math.exp(-dt*4));
  if(t>S.blinkAt+0.5)S.blinkAt=t+3.5+Math.random()*6;
  if(t>S.nextTw){S.twinkleSeed=Math.floor(Math.random()*1e6);S.nextTw=t+2+Math.random()*4;}
  if(S.mode==="awaiting"){
    if(S.pulseAt>1e8)S.pulseAt=t+0.4;
    if(t>S.pulseAt+2.2)S.pulseAt=t+8.0;
  }else S.pulseAt=1e9;
}
function setMode(m,t){if(S.mode!==m){S.mode=m;S.enterT=t;if(m==="speaking")S.typeT=0;if(m==="awaiting")S.pulseAt=1e9;}}

/* 页面文字纹理:正常字号段落,向上匀速滚动;点阵贴片会把经过的文字半调化 */
const VIEW={cur:0,tgt:0};
function pageOf(scene){
  if(scene._pg)return scene._pg;
  const pc=document.createElement("canvas");pc.width=512;pc.height=1024;
  const x=pc.getContext("2d");
  x.fillStyle=scene.pink[0];x.fillRect(0,0,512,1024);
  const H2=["设计原则","动效语言","状态与反馈","ASCII 点阵"];
  const L=["Alva 常驻在页面右下角,一小块自包含的点阵。","它在待机时安静呼吸,思考时点色旋成三臂涡,","回答问题时像打字机一样逐行点亮。","The dot lattice halftones whatever scrolls","beneath it, like a tiny pixel screen.","滚动页面时,身后的文字被点阵接管重现,","风格来自品牌 imagery 的半调语言。","Color carries content; size answers hover;","a click ripples out from the very dot you hit.","每一次状态切换都只是颜色在网格上流动,","格点本身永不移位。"];
  let y=64,li=0,hi=0;
  while(y<1000){
    if(li%6===0){x.font="600 54px -apple-system,PingFang SC,sans-serif";x.fillStyle=scene.pink[1];x.fillText(H2[hi%4],40,y);hi++;y+=78;}
    x.font="42px -apple-system,PingFang SC,sans-serif";x.fillStyle=(li%5===4)?scene.pink[2]:scene.pink[1];
    x.fillText(L[li%L.length],40,y);li++;y+=62;
  }
  scene._pg={cv:pc,data:x.getImageData(0,0,512,1024).data};
  return scene._pg;
}
function rrp(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
/* 品牌 imagery 的字符阶梯:点 → 十字 → 菱形 → 小方 → 圆角块 */
function drawGlyph(x2,y2,c,lvl,color,ctx){
  ctx.fillStyle=color;
  if(lvl<=1){ctx.beginPath();ctx.arc(x2,y2,c*0.10,0,7);ctx.fill();return;}
  if(lvl===2){ctx.beginPath();ctx.arc(x2,y2,c*0.16,0,7);ctx.fill();return;}
  if(lvl===3){const w=c*0.15,l=c*0.58;                              /* 十字 + */
    ctx.fillRect(x2-l/2,y2-w/2,l,w);ctx.fillRect(x2-w/2,y2-l/2,w,l);return;}
  if(lvl===4){const s=c*0.40;                                       /* 菱形 ◇ */
    ctx.beginPath();ctx.moveTo(x2,y2-s);ctx.lineTo(x2+s,y2);ctx.lineTo(x2,y2+s);ctx.lineTo(x2-s,y2);ctx.closePath();ctx.fill();return;}
  if(lvl===5){const s=c*0.58;rrp(ctx,x2-s/2,y2-s/2,s,s,c*0.13);ctx.fill();return;}  /* 小方 ▪ */
  const s=c*0.84;rrp(ctx,x2-s/2,y2-s/2,s,s,c*0.26);ctx.fill();                      /* 圆角块 ▦ */
}

      pgScale=W/512;pgTexH=1024*pgScale;
      pgSy=(t*16)%pgTexH;
      ctx.globalAlpha=VIEW.cur;
      ctx.drawImage(pg.cv,0,-pgSy,W,pgTexH);
      ctx.drawImage(pg.cv,0,-pgSy+pgTexH,W,pgTexH);
      ctx.globalAlpha=1;
    }
    /* 自包含点阵按钮:N×N 格点组成按钮本体(markPx 见方),
       圆角轮廓由角部格点裁切形成;画布其余部分是页面,留空 */
    const N=13;
    const c=markPx/N;
    const cols=N,rows=N;
    const x0=(W-N*c)/2,y0=(H-N*c)/2;
    const cx=W/2,cy=H/2;
    /* 贴片底下的原文字挖掉(用页面底色),由点阵以半调方式接管重现 */
    if(pg){
      ctx.globalAlpha=VIEW.cur;
      ctx.fillStyle=scene.pink[0];
      rrp(ctx,x0-c*0.4,y0-c*0.4,N*c+c*0.8,N*c+c*0.8,markPx*0.18);ctx.fill();
      ctx.globalAlpha=1;
    }
    const wI=S.w.idle,wT=S.w.thinking,wS=S.w.speaking,wA=S.w.awaiting;
    const logoA=Math.max(0,1-(wT+wS)*1.35);
    /* 内容层生命体征(全部走颜色/图形通道,不动点的大小) */
    const la=0.80+0.14*Math.sin(t*0.66)+0.06*Math.sin(t*1.13+0.9);   // logo 呼吸=颜色深浅
    let blinkY=1;const be=t-S.blinkAt;
    if(be>0&&be<0.35)blinkY=1-0.55*Math.sin(be/0.35*Math.PI);        // 眨眼=纵向挤压采样
    let gx2=S.gz[0],gy2=S.gz[1];
    if(hov.cur>0.01){
      const mu=(hov.x-cx)/(markPx/2),mv=(hov.y-cy)/(markPx/2);
      const ml=Math.hypot(mu,mv)+1e-5;
      gx2=gx2*(1-hov.cur)+(mu/ml)*0.22*hov.cur;gy2=gy2*(1-hov.cur)+(mv/ml)*0.17*hov.cur;
    }
    /* 打字子网格:mark 周边 13×13 的虚拟页 */
    const M=13,speed=M*M/1.6,cycle=M*M/speed+0.9,ph=S.typeT%cycle;
    const on=(Math.floor(t/0.53)%2)===0?1:0.12;                      // 终端光标节律
    const pt=t-S.pulseAt;                                            // 等待脉冲相位
    const sHov=markPx*0.24;                                          // hover 影响半径:局部小范围,不整片变大
    for(let iy=0;iy<rows;iy++)for(let ix=0;ix<cols;ix++){
      const px=x0+ix*c+c/2,py=y0+iy*c+c/2;
      const u=(px-cx)/(markPx/2),v=(py-cy)/(markPx/2);
      /* 圆角轮廓:角部格点裁掉,按钮形状由点阵自己圈出 */
      const mS=Math.pow(Math.pow(Math.abs(u),6)+Math.pow(Math.abs(v),6),1/6);
      if(mS>1.02)continue;
      const rr=Math.hypot(u,v);
      /* ---- 颜色通道:内容/状态(取最强的一个来源) ---- */
      let color=null,str=0;
      if(logoA>0.03){
        const col2=sampleLogo(u-gx2*0.14,(v-gy2*0.14)/blinkY,0.72);
        if(col2){color=col2;str=logoA*la;}
      }
      if(wT>0.05&&rr<1.7){                                           // 思考:三臂旋涡图形
        const ang=Math.atan2(v,u);
        const sp=0.5+0.5*Math.sin(ang*3-S.swirl*2.0+rr*4.5);
        const fast=Math.min(1,(S.swirlV-0.25)/4.5);
        const e=sp*wT*(0.35+0.65*Math.min(rr/0.3,1))*(1+0.35*fast*(rr-0.5));
        if(e>str&&e>0.30){str=Math.min(1,e);color=(e>0.85)?scene.glyphHi(1):scene.glyph(Math.min(1,0.25+e));}
      }
      if(wS>0.05&&Math.abs(u)<1.08&&Math.abs(v)<1.08){               // 输出:打字图形
        const tx=Math.round((u+1.08)/2.16*(M-1)),ty=Math.round((v+1.08)/2.16*(M-1));
        const idx=ty*M+tx;
        let d=0;
        if(ph*speed>=idx){
          const age=ph-idx/speed;
          d=0.30+0.70*Math.exp(-age*1.1);
          if(ph>M*M/speed){
            const dis=(ph-M*M/speed)*speed*2.2;
            if(dis>idx)d*=Math.max(0,1-(dis-idx)/(M*M*0.18));        // 按打字顺序消散
          }
        }
        let cc=null;
        if(Math.floor(ph*speed)===idx&&ph<M*M/speed){d=1.2;cc=scene.cursor;}
        const e=d*wS;
        if(e>str&&e>0.25){str=Math.min(1,e);color=cc||((d>0.75)?scene.glyphHi(1):scene.glyph(Math.min(1,0.2+d)));}
      }
      if(wA>0.05){
        if(u>0.55&&u<0.98&&v>-0.98&&v<-0.55){                        // 等待:按钮右上角光标块(点变色闪烁)
          const e=wA*on;
          if(e>str){str=e;color=scene.cursor;}
        }
        if(pt>0&&pt<2.2){                                            // 脉冲:一圈变色涟漪扩散
          const R=pt*1.5;
          const e=0.8*Math.exp(-Math.pow((rr-R)*3.0,2))*(1-pt/2.2)*wA;
          if(e>str&&e>0.25){str=Math.min(1,e);color=scene.glyph(Math.min(1,0.3+e));}
        }
      }
      /* 待机微闪:个别格子颜色轻轻亮一下(不动大小) */
      if(wI>0.5&&str<0.2){
        const hw=hash2(ix+S.twinkleSeed,iy*7+1);
        if(hw>0.996){const p2=(t-S.nextTw+6)%6;const e=0.5*Math.exp(-Math.pow((p2-0.3)*3.2,2))*wI;
          if(e>0.1){str=e;color=scene.glyph(Math.min(1,0.3+e));}}
      }
      /* ---- 大小通道:hover 邻近反馈(局部小范围、轻增益) + 点击涟漪 ---- */
      let sMul=1;
      if(hov.cur>0.01){
        const dxp=px-hov.x,dyp=py-hov.y;
        sMul+=0.85*hov.cur*Math.exp(-(dxp*dxp+dyp*dyp)/(2*sHov*sHov)); // 只有紧挨鼠标的几颗点变大
      }
      let ripA=0;
      for(let k=0;k<ripples.length;k++){
        const rp=ripples[k];const rt=t-rp.t0;
        if(rt<0||rt>1.1)continue;
        const dist=Math.hypot(px-rp.x,py-rp.y);
        const g=Math.exp(-Math.pow((dist-rt*markPx*2.4)/(markPx*0.16),2))*Math.exp(-rt*2.2);
        sMul+=1.1*g;ripA=Math.max(ripA,g);                           // 涟漪:一圈荡开
      }
      sMul=Math.min(sMul,1.8);
      /* ---- 绘制:brand book 的字符阶梯 ---- */
      if(color){
        /* 内容点:强度决定字形——菱形→小方→圆角块(logo/光标恒为块) */
        const lvl=(str>0.8)?6:(str>0.5?5:4);
        drawGlyph(px,py,c*sMul,lvl,color,ctx);
      }else{
        /* 基线/半调:十字打底;背后文字越深,字形越实(十字→菱形→小方) */
        let e2=scene.base;
        if(pg){
          const tx=Math.min(511,Math.max(0,Math.round(px/pgScale)));
          const ty=((Math.round((py+pgSy)/pgScale))%1024+1024)%1024;
          const i2=(ty*512+tx)*4;
          const Lp=(pg.data[i2]*0.299+pg.data[i2+1]*0.587+pg.data[i2+2]*0.114)/255;
          e2=Math.min(1,e2+0.75*Math.min(1,Math.abs(Lp-scene.Lbg)*2.4)*VIEW.cur);
        }
        if(ripA>0.05)e2=Math.min(1,e2+0.45*ripA);
        const lvl=(e2>0.80)?5:(e2>0.55?4:3);
        drawGlyph(px,py,c*sMul,lvl,scene.glyph(Math.min(1,Math.max(scene.base,e2))),ctx);
      }
    }
  }
  return {draw};
}
/* ---------- 页面 ---------- */
const cols=document.getElementById("cols");const insts=[];
const MOBILE=window.matchMedia&&window.matchMedia("(max-width:640px)").matches;
if(!MOBILE){
  cols.innerHTML='<tr><th></th>'+SCENES.map(sc=>'<th>'+sc.cap+'</th>').join('')+'</tr>'
   +'<tr><th class="rl">PC 常驻按钮<br>48px</th>'+SCENES.map((sc,i)=>'<td class="cell" style="background:'+sc.css+'"><canvas class="cv1" data-k="b'+i+'"></canvas></td>').join('')+'</tr>'
   +'<tr><th class="rl">Chat 行内 logo<br>32px</th>'+SCENES.map((sc,i)=>'<td class="cell" style="background:'+sc.css+'"><canvas class="cv2" data-k="s'+i+'"></canvas></td>').join('')+'</tr>';
}else{
  cols.innerHTML='<tr><th></th><th>PC 常驻<br>48px</th><th>Chat 行内<br>32px</th></tr>'
   +SCENES.map((sc,i)=>'<tr><th class="rl">'+sc.cap+'</th><td class="cell" style="background:'+sc.css+'"><canvas class="cv1" data-k="b'+i+'"></canvas></td><td class="cell" style="background:'+sc.css+'"><canvas class="cv2" data-k="s'+i+'"></canvas></td></tr>').join('');
}
SCENES.forEach((sc,i)=>{
  insts.push(makeCell(document.querySelector('canvas[data-k="b'+i+'"]'),sc,48));
  insts.push(makeCell(document.querySelector('canvas[data-k="s'+i+'"]'),sc,32));
});
const HINTS={
 idle:"待机 — 按钮是一小块自包含的点阵贴片:基线点阵就是按钮的背景,圆角轮廓由角部格点裁切形成,放在页面任何角落都自成一体;中心一组点变色组成 logo,颜色深浅缓慢呼吸、每 3~9 秒眨眼、随机注视;hover:离鼠标越近点越大;点击:从命中点荡开一圈涟漪。",
 thinking:"思考 — logo 的变色点让位给三臂旋涡图形:一圈点按螺旋次序变色流转,慢-快-慢地甩动,转速带惯性滞后,转快时外圈更浓;底层点阵纹丝不动,只有颜色在走。",
 speaking:"输出中 — 打字机:mark 区域的点按行左→右恒速变色点亮(一气呵成,1.6s 一页),光标点深色满亮,新字深旧字淡;打完顿一拍,按打字顺序逐段褪色,换气重来。",
 awaiting:"等待回应 — 右上角一小块点变色为终端光标,530ms 节律闪烁(该你了);logo 静静呼吸,每 10 秒从中心荡出一圈变色脉冲提醒;首次进入即刻脉冲一次。"
};
const hint=document.getElementById("hint");
function setHint(){hint.textContent=HINTS[S.mode];}
document.getElementById("seg").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on",x===b));
  setMode(b.dataset.s,performance.now()/1000);setHint();
});
document.getElementById("vseg").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#vseg button").forEach(x=>x.classList.toggle("on",x===b));
  VIEW.tgt=(b.dataset.v==="page")?1:0;
});
setHint();
(function loop(){
  const t=performance.now()/1000;
  stepState(t);
  VIEW.cur+=(VIEW.tgt-VIEW.cur)*0.1;
  insts.forEach(o=>o.draw(t));
  requestAnimationFrame(loop);
})();
</script>
