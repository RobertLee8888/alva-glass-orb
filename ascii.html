/* ============================================================
   Alva ASCII mark v3 — 统一网格系统
   · 按钮本体 = 一张永远在场的格点阵:每个格点常驻基线微点,圆角轮廓由格点自己圈出
   · 所有状态只是在同一张阵上升降字符等级(空→点→十字→菱形→方块),格点永不移位
   · logo 本身用字符点阵渲染(品牌 Symbol Element 的 dot-matrix 阶段)
   · 表情归内容(点阵 logo 的呼吸/眨眼/注视/消隐),交互归格阵(hover/press/预备-过冲)
   ============================================================ */
function hash2(ix,iy){let h=(ix*374761393+iy*668265263)>>>0;h=(h^(h>>13))>>>0;h=(h*1274126177)>>>0;return ((h^(h>>16))>>>0)/4294967296;}
const S={
  mode:"idle",
  w:{idle:1,thinking:0,speaking:0,awaiting:0},
  swirl:0,swirlV:0.25,
  typeT:0,
  enterT:0,kickT:-9,                 // kickT:状态切换的预备-过冲-回弹
  gz:[0,0],gzT:[0,0],nextGaze:2.5,
  blinkAt:2.0,
  twinkleSeed:0,nextTw:1.5,
  waveAt:3.0,                        // 待机微事件:一道斜向的字符浪
  pulseAt:1e9,
  last:0
};
function stepState(t){
  /* dt 上限 1s:指数滤波对任意 dt 无条件稳定;标签页后台 RAF 暂停后一帧补齐进度 */
  const dt=Math.min(1.0,Math.max(0.001,t-S.last||0.016));S.last=t;
  for(const k in S.w){
    const tgt=(S.mode===k)?1:0;
    const rate=(tgt>S.w[k])?3.2:1.8;               // 起得快落得慢
    S.w[k]+=(tgt-S.w[k])*(1-Math.exp(-dt*rate));
  }
  const th=S.w.thinking;
  let vTgt=0.25;
  if(th>0.02){
    const ph=(t-S.enterT)%3.2;
    const whip=Math.pow(Math.sin(Math.PI*ph/3.2),2.0); // 慢-快-慢甩动
    vTgt=0.25+th*(1.2+5.5*whip);
  }
  S.swirlV+=(vTgt-S.swirlV)*(1-Math.exp(-dt*(vTgt>S.swirlV?1.6:0.9))); // 惯性滞后
  S.swirl+=S.swirlV*dt;
  if(S.w.speaking>0.4)S.typeT+=dt;                  // 打字恒速,一气呵成
  if(t>S.nextGaze){
    S.gzT=(Math.random()<0.3)?[0,0]:[(Math.random()-0.5)*0.30,(Math.random()-0.5)*0.22];
    S.nextGaze=t+2.5+Math.random()*4;
  }
  S.gz[0]+=(S.gzT[0]-S.gz[0])*(1-Math.exp(-dt*4));
  S.gz[1]+=(S.gzT[1]-S.gz[1])*(1-Math.exp(-dt*4));
  if(t>S.blinkAt+0.5)S.blinkAt=t+3.5+Math.random()*6;
  if(t>S.nextTw){S.twinkleSeed=Math.floor(Math.random()*1e6);S.nextTw=t+2+Math.random()*4;}
  if(t>S.waveAt+1.8)S.waveAt=t+4+Math.random()*5;   // 不可预测的浪
  if(S.mode==="awaiting"){
    if(S.pulseAt>1e8)S.pulseAt=t+0.4;
    if(t>S.pulseAt+2.0)S.pulseAt=t+8.0;
  }else S.pulseAt=1e9;
}
function setMode(m,t){if(S.mode!==m){S.mode=m;S.enterT=t;S.kickT=t;if(m==="speaking")S.typeT=0;if(m==="awaiting")S.pulseAt=1e9;}}
/* 状态切换的瓦片动势:预备(缩)-过冲(涨)-回弹落定 */
function kickScale(t){
  const k=t-S.kickT;if(k<0||k>0.9)return 1;
  if(k<0.10)return 1-0.05*(k/0.10);                       // 预备:先收一口气
  return 1-0.05*Math.cos((k-0.10)*14)*Math.exp(-(k-0.10)*5); // 过冲+衰减落定
}
/* ---------- 背景纹理能量 e ∈ [0,1]:决定底层字符的阶level ---------- */
function texIdle(u,v,t,ix,iy){
  let e=0.34+0.20*Math.sin(u*2.3+t*0.31)*Math.sin(v*2.1-t*0.23)
       +0.12*Math.sin((u+v)*1.7+t*0.19);                  // 无理数比叠加,永不重复
  const hw=hash2(ix+S.twinkleSeed,iy*7+1);                // 微闪烁:随机格子偶尔亮一下
  if(hw>0.982){const ph=(t-S.nextTw+6)%6;e+=0.55*Math.exp(-Math.pow((ph-0.3)*4,2));}
  const wp=t-S.waveAt;                                    // 一道斜浪扫过(间歇微事件)
  if(wp>0&&wp<1.8){const pr=(u+v)*0.5;e+=0.5*Math.exp(-Math.pow((pr-(wp*1.6-1.3))*3.2,2))*(1-wp/1.8);}
  return e;
}
function texThink(u,v,t,ang,r){
  const sp=Math.sin(ang*3-S.swirl*2.0+r*4.5);             // 三臂旋涡,被 swirl 卷着走
  const fast=Math.min(1,(S.swirlV-0.25)/4.5);
  return 0.42+0.42*sp*(0.55+0.45*r)+0.24*fast*(r-0.35);   // 转快时离心甩向外圈
}
function texAwait(u,v,t,r){
  let e=0.22+0.10*Math.sin(u*1.9+t*0.26)*Math.sin(v*1.7-t*0.21);
  const pt=t-S.pulseAt;                                   // 每 10s 荡出一圈脉冲
  if(pt>0&&pt<1.6){const R=pt*0.95;e+=0.65*Math.exp(-Math.pow((r-R)*7,2))*(1-pt/1.6);}
  return e;
}
/* ---------- 字符七阶 ---------- */
function drawGlyph(x2,y2,c,lvl,color,ctx){
  if(lvl<=0)return;
  ctx.fillStyle=color;
  if(lvl===1){ctx.beginPath();ctx.arc(x2,y2,c*0.09,0,7);ctx.fill();return;}
  if(lvl===2){ctx.beginPath();ctx.arc(x2,y2,c*0.15,0,7);ctx.fill();return;}
  if(lvl===3){const w=c*0.14,l=c*0.64;
    ctx.fillRect(x2-l/2,y2-w/2,l,w);ctx.fillRect(x2-w/2,y2-l/2,w,l);return;}
  if(lvl===4){const s=c*0.44;
    ctx.beginPath();ctx.moveTo(x2,y2-s);ctx.lineTo(x2+s,y2);ctx.lineTo(x2,y2+s);ctx.lineTo(x2-s,y2);ctx.closePath();ctx.fill();return;}
  if(lvl===5){const s=c*0.60;rrp(ctx,x2-s/2,y2-s/2,s,s,c*0.15);ctx.fill();return;}
  const s=c*0.88;rrp(ctx,x2-s/2,y2-s/2,s,s,c*0.28);ctx.fill();
}
function rrp(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function makeCell(cv,scene,tilePx){
  const ctx=cv.getContext("2d");

  /* 点阵 logo 采样:u,v ∈ [-1,1],logo 占中央 span;返回该格颜色或 null */
  function sampleLogo(u,v,span){
    if(!map)return null;

    if(x<0||y<0||x>=MS||y>=MS)return null;

  cv.addEventListener("pointerup",rel);cv.addEventListener("pointerleave",rel);cv.addEventListener("pointercancel",rel);
  function draw(t){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const W=cv.clientWidth||180,H=cv.clientHeight||100;
    if(cv.width!==Math.round(W*dpr)){cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);}
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle=scene.css;ctx.fillRect(0,0,W,H);
    hov.cur+=(hov.tgt-hov.cur)*0.14;
    let prs=0;
    if(press.held)prs=Math.min(1,(t-press.downT)/0.09);
    else{const ue=t-press.upT;if(ue>=0&&ue<0.9)prs=Math.exp(-ue*7)*Math.cos(ue*18);}
    const pc=Math.max(0,prs);
    /* 统一网格系统:按钮的身体就是这张格点阵——每个格点常驻一枚基线微点,
       任何状态都只是在同一张阵上升降字符等级,网格永远可见、永不移位 */
    const tile0=Math.min(tilePx,H*0.86);
    const sc=kickScale(t)*(1+0.03*hov.cur)*(1-0.06*pc);
    const tile=tile0*sc;
    const cx=W/2,cy=H/2;
    const N=(Math.max(11,Math.round(tile0/3.4))|1);
    const inset=1.0;
    const c=tile*inset/N;
    const wI=S.w.idle,wT=S.w.thinking,wS=S.w.speaking,wA=S.w.awaiting;
    const wSum=wI+wT+wS+wA+1e-6;
    const logoA=Math.max(0,1-(wT+wS)*1.35);            // 思考/输出时点阵 logo 消隐
    /* 内容层的生命体征 */
    const breath=1+0.035*Math.sin(t*0.66)+0.018*Math.sin(t*1.13+0.9);
    let blinkY=1;const be=t-S.blinkAt;
    if(be>0&&be<0.35)blinkY=1-0.22*Math.sin(be/0.35*Math.PI);
    let gx2=S.gz[0],gy2=S.gz[1];
    if(hov.cur>0.01){gx2=gx2*(1-hov.cur)+hov.x*0.35*hov.cur;gy2=gy2*(1-hov.cur)+hov.y*0.28*hov.cur;}
    const span=0.80*breath*(1+0.10*pc);                // 按压:内容贴面被放大
    /* 打字参数 */
    const total=N*N,speed=total/1.6,cycle=total/speed+0.9,ph=S.typeT%cycle;
    for(let iy=0;iy<N;iy++)for(let ix=0;ix<N;ix++){
      const u=(ix-(N-1)/2)/((N-1)/2),v=(iy-(N-1)/2)/((N-1)/2);
      /* 圆角方形轮廓由格点阵自己圈出:角部格点裁掉 */
      const mS=Math.pow(Math.pow(Math.abs(u),6)+Math.pow(Math.abs(v),6),1/6);
      if(mS>1.02)continue;
      const r=Math.hypot(u,v)*0.7071;
      const ang=Math.atan2(v,u);
      const gxp=cx+u*(tile*inset)/2,gyp=cy+v*(tile*inset)/2;
      /* 1) 点阵 logo(内容层):呼吸缩放采样、眨眼纵向挤压、注视偏移 */
      if(logoA>0.03){
        const colr=sampleLogo((u-gx2*0.14)*1,( (v-gy2*0.14))/blinkY,span);
        if(colr){
          const wobble=0.5+0.5*Math.sin(t*0.9+hash2(ix,iy)*6.28);   // 点阵内部轻微明暗游走
          ctx.globalAlpha=logoA*(0.88+0.12*wobble);
          drawGlyph(gxp,gyp,c,5+(wobble>0.72?1:0),colr,ctx);
          ctx.globalAlpha=1;
          continue;
        }
      }
      /* 2) 背景纹理(容器层):状态混合的能量场 */
      let e=(wI*texIdle(u,v,t,ix,iy)
            +wT*texThink(u,v,t,ang,r)
            +wA*texAwait(u,v,t,r))/wSum;
      /* 输出中:打字机图层压过纹理 */
      let typeC=null;
      if(wS>0.05){
        const idx=iy*N+ix;
        let d=0;
        if(ph*speed>=idx){
          const age=ph-idx/speed;
          d=0.25+0.75*Math.exp(-age*1.1);
          if(ph>total/speed){
            const dis=(ph-total/speed)*speed*2.2;
            if(dis>idx)d*=Math.max(0,1-(dis-idx)/(total*0.18));  // 按打字顺序消散
          }
        }
        if(Math.floor(ph*speed)===idx&&ph<total/speed){d=1.15;typeC=scene.cursor;}
        e=e*(1-wS)+d*wS;
        if(!typeC&&d>0.62)typeC="hi";
      }
      /* hover:指针周围字符升阶(容器感知到你) */
      if(hov.cur>0.01){
        const du=u-hov.x*(W/(tile*inset)),dv=v-hov.y*(H/(tile*inset));
        e+=0.4*hov.cur*Math.exp(-(du*du+dv*dv)*6);
      }
      e=e*(1-0.45*pc)+0.28*pc;                          // 按压:纹理被按平,对比消失
      const lvl=Math.min(6,Math.floor(e*4.6));
      if(lvl<=0){                                       // 基线格点:能量再低,网格也永远在场
        drawGlyph(gxp,gyp,c,1,scene.glyph(scene.base*(1-0.35*pc)),ctx);
        continue;
      }
      const alpha=Math.min(1,0.30+e*0.85);
      let color;
      if(typeC==="hi")color=scene.glyphHi(alpha);
      else if(typeC)color=typeC;
      else color=(e>0.86)?scene.glyphHi(Math.min(1,alpha)):scene.glyph(alpha);
      drawGlyph(gxp,gyp,c,lvl,color,ctx);
    }
    /* 等待回应:右上角终端光标块,530ms 节律(该你了);对齐到格点阵,不脱离网格系统 */
    if(wA>0.02){
      const on=(Math.floor(t/0.53)%2)===0?1:0.12;
      const ixC=N-2,iyC=1;
      const bx=cx+((ixC-(N-1)/2)/((N-1)/2))*(tile*inset)/2;
      const by=cy+((iyC-(N-1)/2)/((N-1)/2))*(tile*inset)/2;
      const s=c*1.6;
      ctx.globalAlpha=wA*on;ctx.fillStyle=scene.cursor;
      rrp(ctx,bx-s/2,by-s/2,s,s,s*0.22);ctx.fill();ctx.globalAlpha=1;
    }
  }
  return {draw};
}

 idle:"待机 — 按钮本体是一张永远在场的格点阵(圆角轮廓由格点自己圈出),所有状态都在同一张阵上升降字符等级、格点永不移位;底层按无理数比节奏起伏,偶发单格闪烁和一道斜浪;点阵 logo 承载表情——呼吸、眨眼、随机注视。",
 thinking:"思考 — 点阵 logo 散解,让位给三臂字符旋涡:慢-快-慢地甩动,转速带惯性滞后,转快时字符被离心力甩向外圈;切换瞬间瓦片先收一口气再过冲落定。",
 speaking:"输出中 — 打字机:字符按行左→右恒速敲满整块瓦片(一气呵成,1.6s 一页),光标块深色满亮,新字深旧字淡;打完顿一拍,按打字顺序逐段消散,换气重来。",
 awaiting:"等待回应 — 瓦片右上角一枚终端光标块以 530ms 节律闪烁(该你了);点阵 logo 安静呼吸,纹理几乎静止,每 10 秒从中心荡出一圈字符脉冲提醒;首次进入即刻脉冲。"
};
